name: Deploy to GitHub Pages

on:
  # Build on every push to the default branch. Keystatic commits content
  # changes here too, so publishing in the CMS triggers a rebuild + redeploy.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          # path: .          # Astro project lives at the repo root
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
